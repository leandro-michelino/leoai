leoai_repo_url: "https://github.com/leandro-michelino/leoai.git"
leoai_repo_branch: "main"
leoai_app_dir: "/opt/leoai"
leoai_venv_dir: "/opt/leoai/.venv"
leoai_service_name: "leoai-api"
leoai_api_host: "127.0.0.1"
leoai_api_port: 8000
leoai_public_http_port: 80
leoai_public_https_port: 443
leoai_tls_mode: "self_signed" # self_signed | letsencrypt | disabled
leoai_tls_domain: ""
leoai_tls_email: ""
leoai_oci_auth_mode: "instance_principal"
leoai_oci_region: "eu-madrid-1"
leoai_oci_compartment_id: "ocid1.compartment.oc1..preencha_aqui"
leoai_oci_genai_model_id: "cohere.command-a"
leoai_oci_api_format: "COHERE"
leoai_oci_cohere_safety_mode: "OFF"
leoai_api_auth_enabled: "false"
leoai_api_auth_key: "change-me-very-strong-key"
leoai_web_search_enabled: "true"
leoai_web_search_max_results: 5
leoai_rag_enabled: "true"
leoai_rag_store_path: "/opt/leoai/data/knowledge_base.json"
leoai_rag_embeddings_enabled: "true"
leoai_rag_embedding_model_id: "cohere.embed-multilingual-v3.0"
leoai_rag_rerank_alpha: "0.65"
leoai_rag_chunk_size: "1200"
leoai_rag_chunk_overlap: "180"
leoai_rag_default_top_k: "5"
leoai_files_store_dir: "/opt/leoai/data/files/uploads"
leoai_generated_store_dir: "/opt/leoai/data/files/generated"
leoai_files_index_path: "/opt/leoai/data/files/index.json"
leoai_max_upload_size_mb: "100"
