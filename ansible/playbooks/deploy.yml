---
- name: Deploy LeoAI app
  hosts: leoai
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    repo_dest: "{{ leoai_app_dir }}"
  tasks:
    - name: Validate API auth key strength
      ansible.builtin.assert:
        that:
          - leoai_api_auth_enabled | lower == "false" or (leoai_api_auth_key | length) >= 12
          - leoai_api_auth_enabled | lower == "false" or leoai_api_auth_key != "change-me-very-strong-key"
        fail_msg: "Defina uma chave forte em leoai_api_auth_key antes do deploy."

    - name: Validate TLS mode
      ansible.builtin.assert:
        that:
          - leoai_tls_mode in ["disabled", "self_signed", "letsencrypt"]
        fail_msg: "leoai_tls_mode deve ser: disabled, self_signed ou letsencrypt."

    - name: Validate LetsEncrypt requirements
      ansible.builtin.assert:
        that:
          - leoai_tls_domain | length > 0
          - leoai_tls_email | length > 0
        fail_msg: "Para letsencrypt, defina leoai_tls_domain e leoai_tls_email."
      when: leoai_tls_mode == "letsencrypt"

    - name: Checkout repository
      ansible.builtin.git:
        repo: "{{ leoai_repo_url }}"
        dest: "{{ repo_dest }}"
        version: "{{ leoai_repo_branch }}"
      become_user: "{{ ansible_user }}"

    - name: Install runtime and project dependencies
      ansible.builtin.pip:
        name:
          - "pip>=24.0"
          - "setuptools>=68.0"
          - "wheel"
          - "uvicorn>=0.30.0"
        virtualenv: "{{ leoai_venv_dir }}"
        virtualenv_command: "python3 -m venv"
      become_user: "{{ ansible_user }}"

    - name: Install project in editable mode
      ansible.builtin.pip:
        name: "{{ repo_dest }}"
        editable: true
        virtualenv: "{{ leoai_venv_dir }}"
      become_user: "{{ ansible_user }}"

    - name: Ensure .env exists with placeholder
      ansible.builtin.copy:
        dest: "{{ leoai_app_dir }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
        force: true
        content: |
          OCI_AUTH_MODE={{ leoai_oci_auth_mode }}
          OCI_REGION={{ leoai_oci_region }}
          OCI_COMPARTMENT_ID={{ leoai_oci_compartment_id }}
          OCI_GENAI_MODEL_ID={{ leoai_oci_genai_model_id }}
          OCI_API_FORMAT={{ leoai_oci_api_format }}
          OCI_COHERE_SAFETY_MODE={{ leoai_oci_cohere_safety_mode }}
          LEOAI_API_AUTH_ENABLED={{ leoai_api_auth_enabled }}
          LEOAI_API_AUTH_KEY={{ leoai_api_auth_key }}
          WEB_SEARCH_ENABLED={{ leoai_web_search_enabled }}
          WEB_SEARCH_MAX_RESULTS={{ leoai_web_search_max_results }}
          RAG_ENABLED={{ leoai_rag_enabled }}
          RAG_STORE_PATH={{ leoai_rag_store_path }}
          RAG_EMBEDDINGS_ENABLED={{ leoai_rag_embeddings_enabled }}
          RAG_EMBEDDING_MODEL_ID={{ leoai_rag_embedding_model_id }}
          RAG_RERANK_ALPHA={{ leoai_rag_rerank_alpha }}
          FILES_STORE_DIR={{ leoai_files_store_dir }}
          GENERATED_STORE_DIR={{ leoai_generated_store_dir }}
          FILES_INDEX_PATH={{ leoai_files_index_path }}
          MAX_UPLOAD_SIZE_MB={{ leoai_max_upload_size_mb }}
          OCI_TEMPERATURE=0.2
          OCI_TOP_P=0.75
          OCI_MAX_TOKENS=600

    - name: Ensure RAG data directory exists
      ansible.builtin.file:
        path: "{{ leoai_rag_store_path | dirname }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0750"

    - name: Ensure upload files directory exists
      ansible.builtin.file:
        path: "{{ leoai_files_store_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0750"

    - name: Ensure generated files directory exists
      ansible.builtin.file:
        path: "{{ leoai_generated_store_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0750"

    - name: Ensure file index directory exists
      ansible.builtin.file:
        path: "{{ leoai_files_index_path | dirname }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0750"

    - name: Install Nginx and TLS dependencies (Debian)
      ansible.builtin.apt:
        name:
          - nginx
          - openssl
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install Certbot dependencies (Debian) when using Let's Encrypt
      ansible.builtin.apt:
        name:
          - certbot
        state: present
        update_cache: true
      when:
        - ansible_os_family == "Debian"
        - leoai_tls_mode == "letsencrypt"

    - name: Install Nginx and TLS dependencies (RedHat/Oracle Linux)
      ansible.builtin.dnf:
        name:
          - nginx
          - openssl
        state: present
        update_cache: true
      when: ansible_os_family == "RedHat"

    - name: Install Certbot dependencies (RedHat/Oracle Linux) when using Let's Encrypt
      ansible.builtin.dnf:
        name:
          - certbot
        state: present
        update_cache: true
      when:
        - ansible_os_family == "RedHat"
        - leoai_tls_mode == "letsencrypt"

    - name: Define TLS file paths for self-signed mode
      ansible.builtin.set_fact:
        leoai_tls_cert_path: "/etc/ssl/certs/leoai-selfsigned.crt"
        leoai_tls_key_path: "/etc/ssl/private/leoai-selfsigned.key"
      when: leoai_tls_mode == "self_signed"

    - name: Generate self-signed cert if missing
      ansible.builtin.shell: |
        if [ -f "{{ leoai_tls_cert_path }}" ] && [ -f "{{ leoai_tls_key_path }}" ]; then
          echo "exists"
        else
          mkdir -p /etc/ssl/private
          openssl req -x509 -nodes -newkey rsa:2048 -days 365 \
            -keyout "{{ leoai_tls_key_path }}" \
            -out "{{ leoai_tls_cert_path }}" \
            -subj "/CN={{ leoai_tls_domain | default(inventory_hostname, true) }}"
          chmod 600 "{{ leoai_tls_key_path }}"
          echo "created"
        fi
      args:
        executable: /bin/bash
      register: self_signed_result
      changed_when: "'created' in self_signed_result.stdout"
      when: leoai_tls_mode == "self_signed"

    - name: Stop Nginx before standalone certbot challenge
      ansible.builtin.systemd:
        name: nginx
        state: stopped
      failed_when: false
      when: leoai_tls_mode == "letsencrypt"

    - name: Request Let's Encrypt certificate when enabled
      ansible.builtin.command: >
        certbot certonly --standalone
        --non-interactive
        --agree-tos
        -m {{ leoai_tls_email }}
        -d {{ leoai_tls_domain }}
      register: certbot_result
      changed_when: "'Congratulations' in certbot_result.stdout"
      when: leoai_tls_mode == "letsencrypt"

    - name: Define TLS file paths for letsencrypt mode
      ansible.builtin.set_fact:
        leoai_tls_cert_path: "/etc/letsencrypt/live/{{ leoai_tls_domain }}/fullchain.pem"
        leoai_tls_key_path: "/etc/letsencrypt/live/{{ leoai_tls_domain }}/privkey.pem"
      when: leoai_tls_mode == "letsencrypt"

    - name: Configure Nginx reverse proxy
      ansible.builtin.template:
        src: "../templates/leoai-nginx.conf.j2"
        dest: "/etc/nginx/conf.d/leoai.conf"
        mode: "0644"
      notify: Restart Nginx

    - name: Disable default Nginx server config when present
      ansible.builtin.file:
        path: "/etc/nginx/conf.d/default.conf"
        state: absent
      notify: Restart Nginx

    - name: Check SELinux mode
      ansible.builtin.command: getenforce
      register: selinux_mode
      changed_when: false
      failed_when: false

    - name: Allow Nginx to connect to local upstream on SELinux
      ansible.builtin.command: setsebool -P httpd_can_network_connect 1
      when: selinux_mode.stdout in ["Enforcing", "Permissive"]

    - name: Check firewalld status
      ansible.builtin.command: systemctl is-active firewalld
      register: firewalld_status
      changed_when: false
      failed_when: false

    - name: Ensure public ports are open in firewalld
      ansible.builtin.shell: |
        changed=0
        for p in 22 {{ leoai_public_http_port }} {{ leoai_public_https_port }}; do
          if ! firewall-cmd --query-port=${p}/tcp >/dev/null 2>&1; then
            firewall-cmd --permanent --add-port=${p}/tcp >/dev/null
            changed=1
          fi
        done
        if firewall-cmd --query-port={{ leoai_api_port }}/tcp >/dev/null 2>&1; then
          firewall-cmd --permanent --remove-port={{ leoai_api_port }}/tcp >/dev/null || true
          changed=1
        fi
        if [ "$changed" -eq 1 ]; then
          firewall-cmd --reload >/dev/null
          echo "changed"
        else
          echo "unchanged"
        fi
      args:
        executable: /bin/bash
      register: firewalld_public_ports_result
      changed_when: "'changed' in firewalld_public_ports_result.stdout"
      when: firewalld_status.stdout == "active"

    - name: Configure systemd unit for API service
      ansible.builtin.template:
        src: "../templates/leoai-api.service.j2"
        dest: "/etc/systemd/system/{{ leoai_service_name }}.service"
        mode: "0644"
      notify: Restart LeoAI service

    - name: Restart LeoAI service with latest code
      ansible.builtin.systemd:
        name: "{{ leoai_service_name }}"
        enabled: true
        state: restarted
        daemon_reload: true

    - name: Ensure Nginx service is enabled and started
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Verify local API health on VM
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ leoai_api_port }}/health"
        method: GET
        status_code: 200
      register: local_health_check

    - name: Build access URLs for deployment summary
      ansible.builtin.set_fact:
        leoai_access_host: "{{ ansible_host | default(inventory_hostname) }}"
        leoai_access_scheme: "{{ 'http' if leoai_tls_mode == 'disabled' else 'https' }}"

    - name: Deployment handover summary
      ansible.builtin.debug:
        msg:
          - "LeoAI deployment concluido e servicos ativos."
          - "Dashboard: {{ leoai_access_scheme }}://{{ leoai_access_host }}/"
          - "Health: {{ leoai_access_scheme }}://{{ leoai_access_host }}/health"
          - "Auth verify: {{ leoai_access_scheme }}://{{ leoai_access_host }}/auth/verify"
          - "TLS mode: {{ leoai_tls_mode }}"
          - "API auth enabled: {{ leoai_api_auth_enabled }}"
          - "Local VM health payload: {{ local_health_check.json | default({}) }}"
          - "Se API auth estiver habilitada, use header X-API-Key com a chave definida no .env da VM."

  handlers:
    - name: Restart LeoAI service
      ansible.builtin.systemd:
        name: "{{ leoai_service_name }}"
        state: restarted
        daemon_reload: true

    - name: Restart Nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
