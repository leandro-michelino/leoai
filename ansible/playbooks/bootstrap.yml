---
- name: Bootstrap base packages
  hosts: leoai
  become: true
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Install base OS dependencies (Debian)
      ansible.builtin.apt:
        name:
          - git
          - python3
          - python3-venv
          - python3-pip
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install base OS dependencies (RedHat/Oracle Linux)
      ansible.builtin.dnf:
        name:
          - git
          - python3
          - python3-pip
        state: present
        update_cache: true
      when: ansible_os_family == "RedHat"

    - name: Ensure application directory exists
      ansible.builtin.file:
        path: "{{ leoai_app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
